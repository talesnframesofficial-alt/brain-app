<!DOCTYPE html>
<html>
<head>
<title>Wang Memory</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b0f19;
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, 200px);
  gap:20px;
  padding:20px;
}

/* FOLDER */
.folder {
  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
  transition:0.3s;
}

.folder:hover {
  box-shadow:0 0 20px #38bdf8;
  transform:scale(1.05);
}

/* FILE VIEW */
#files {
  padding:20px;
}
</style>
</head>

<body>

<h2 style="padding:20px;">🧠 Wang Memory System</h2>

<div class="grid">
  <div class="folder" onclick="loadType('people')">👤 People</div>
  <div class="folder" onclick="loadType('finance')">💰 Finance</div>
  <div class="folder" onclick="loadType('plans')">📍 Plans</div>
  <div class="folder" onclick="loadType('notes')">📝 Notes</div>
</div>

<div id="files"></div>

<script>
async function loadType(type){
  const res = await fetch("https://brain-app-320i.onrender.com/memory");
  const data = await res.json();

  const filtered = data.filter(d => d.type === type);

  document.getElementById("files").innerHTML =
    filtered.map(d => `<div>📄 ${d.rawText}</div>`).join("");
}
</script>

</body>
</html>
