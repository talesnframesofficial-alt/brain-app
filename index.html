<!DOCTYPE html>
<html>
<head>
<title>Wang AI</title>
<style>
body {
  margin:0;
  background:#050816;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header {
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0f172a;
  border-bottom:1px solid #1e293b;
}

.title { color:#38bdf8; font-weight:bold; }

.chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.msg {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:70%;
}

.user { background:#2563eb; margin-left:auto; }
.ai {
  background:#020617;
  border:1px solid #38bdf8;
  box-shadow:0 0 10px #38bdf8;
}

.input-area {
  display:flex;
  padding:10px;
  background:#0f172a;
}

input {
  flex:1;
  padding:12px;
  background:#020617;
  border:none;
  color:white;
}

button {
  padding:12px;
  margin-left:5px;
  background:#38bdf8;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">🧠 Wang AI</div>
  <a href="dashboard.html" style="color:#22c55e">Dashboard</a>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Talk to Wang..." />
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤</button>
  <input type="file" id="file" />
</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const msg = input.value;
  if(!msg) return;

  addMsg(msg,"user");
  input.value="";

  addMsg("Wang thinking...","ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();
  chat.lastChild.remove();

  addMsg(data.reply,"ai");
}

// 🎤 voice
function startVoice(){
  const rec = new webkitSpeechRecognition();
  rec.onresult = e=>{
    document.getElementById("input").value = e.results[0][0].transcript;
  };
  rec.start();
}
</script>

</body>
</html>
