<!DOCTYPE html>
<html>
<head>
<title>Wang OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#343541;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* 🧠 NEURAL BACKGROUND */
#neural{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
  background:black;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
  background:#202123;
}

.header button{
  background:#444;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* CHAT */
.chat{
  position:absolute;
  top:60px;
  bottom:90px;
  width:100%;
  overflow-y:auto;
  padding:20px;
}

.msg{
  max-width:700px;
  padding:12px 16px;
  margin:10px 0;
  border-radius:8px;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.ai{
  background:rgba(68,70,84,0.9);
}

/* INPUT */
.input-area{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:#343541;
}

.input-box{
  display:flex;
  align-items:center;
  background:#40414f;
  border-radius:12px;
  padding:10px;
}

input{
  flex:1;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

/* BUTTONS */
.icon-btn{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  margin:0 6px;
  cursor:pointer;
}

.send-btn{
  background:#3b82f6;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* HUD */
.hud{
  position:fixed;
  top:70px;
  right:20px;
  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- 🧠 NEURAL -->
<canvas id="neural"></canvas>

<!-- HEADER -->
<div class="header">
  <div>🧠 Wang OS</div>
  <button onclick="openDashboard()">📂 Dashboard</button>
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<!-- HUD -->
<div class="hud">
  <div id="time"></div>
  <div>AI: ONLINE</div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">

    <button class="icon-btn" onclick="startVoice()">🎤</button>

    <input id="input" placeholder="Message Wang..." />

    <input type="file" id="img" style="display:none">
    <button class="icon-btn" onclick="document.getElementById('img').click()">📎</button>

    <button class="send-btn" onclick="send()">➤</button>

  </div>
</div>

<script>
const chat = document.getElementById("chat");

// ⏱️ TIME
setInterval(()=>{
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
},1000);

// ADD MESSAGE
function add(text,cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// ✅ SEND (FIXED BACKEND URL)
async function send(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  add("Thinking...","ai");

  try{
    const res = await fetch("https://brain-app-320i.onrender.com/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });

    const data = await res.json();

    chat.lastChild.remove();

    add(formatReply(data.reply),"ai");

  }catch(err){
    chat.lastChild.remove();
    add("❌ Server not responding","ai");
  }
}

// FORMAT AI RESPONSE
function formatReply(data){
  let html = `<b>${data.title}</b><br><br>`;

  data.sections.forEach(sec=>{
    html += `<b>${sec.heading}</b>`;

    html += `<img src="https://picsum.photos/seed/${encodeURIComponent(sec.image_query)}/600/300">`;

    sec.points.forEach(p=>{
      html += `<div>• ${p}</div>`;
    });

    html += "<br>";
  });

  return html;
}

// ENTER KEY
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});

// 🎤 VOICE
function startVoice(){
  const rec = new webkitSpeechRecognition();
  rec.onresult = e=>{
    document.getElementById("input").value =
      e.results[0][0].transcript;
  };
  rec.start();
}

// 📂 DASHBOARD
function openDashboard(){
  window.open("dashboard.html","_blank");
}

// 🧠 NEURAL ANIMATION
const canvas = document.getElementById("neural");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let nodes=[];
for(let i=0;i<80;i++){
  nodes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  nodes.forEach(n=>{
    n.x+=n.vx;
    n.y+=n.vy;

    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();

    nodes.forEach(m=>{
      let dx=n.x-m.x;
      let dy=n.y-m.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(n.x,n.y);
        ctx.lineTo(m.x,m.y);
        ctx.strokeStyle="rgba(56,189,248,0.2)";
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
