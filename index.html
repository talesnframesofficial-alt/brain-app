<!DOCTYPE html>
<html>
<head>
  <title>Wang - Your AI Brain</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #60a5fa;
    }

    .dashboard-btn {
      padding: 8px 14px;
      background: #22c55e;
      color: black;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }

    /* CHAT AREA */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .ai {
      align-self: flex-start;
      background: #1f2937;
      border: 1px solid #374151;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(5px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* INPUT */
    .input-area {
      display: flex;
      padding: 15px;
      background: #111827;
      border-top: 1px solid #1f2937;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 14px 18px;
      border: none;
      border-radius: 8px;
      background: #60a5fa;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #3b82f6;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="title">🧠 Wang - Your AI Brain</div>
  <a href="dashboard.html" target="_blank" class="dashboard-btn">📂 Dashboard</a>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="input-area">
  <input id="input" placeholder="Ask Wang anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;

  const chat = document.getElementById("chat");

  // USER MESSAGE
  chat.innerHTML += `<div class="msg user">${msg}</div>`;
  input.value = "";

  // TYPING EFFECT
  const typingDiv = document.createElement("div");
  typingDiv.className = "msg ai typing";
  typingDiv.innerText = "Wang is thinking...";
  chat.appendChild(typingDiv);

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://brain-app-320i.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    typingDiv.remove();

    chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    typingDiv.remove();
    chat.innerHTML += `<div class="msg ai">⚠️ Connection error</div>`;
  }
}
</script>

</body>
</html>
