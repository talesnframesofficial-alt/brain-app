<!DOCTYPE html>
<html>
<head>
<title>Wang OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:system-ui;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🧠 NEURAL BACKGROUND */
#neural{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* 📊 GRAPH PANEL */
.graph-box{
  position:fixed;
  bottom:20px;
  right:20px;
  width:250px;
  height:150px;
  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  border-radius:10px;
  padding:10px;
}

/* ⚡ HUD PANEL */
.hud{
  position:fixed;
  top:70px;
  right:20px;
  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

/* HEADER */
.header{
  position:absolute;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

/* CHAT */
.chat{
  position:absolute;
  top:60px;
  bottom:90px;
  width:100%;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  max-width:90%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  word-wrap:break-word;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.ai{
  background:rgba(50,50,60,0.8);
}

/* INPUT */
.input-area{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:rgba(0,0,0,0.7);
}

.input-box{
  display:flex;
  background:#222;
  border-radius:10px;
  padding:8px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:white;
  font-size:16px;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  margin:0 5px;
}

/* 📱 MOBILE FIX */
@media(max-width:600px){
  .graph-box{
    width:160px;
    height:100px;
  }
  .hud{
    font-size:10px;
  }
}
</style>
</head>

<body>

<!-- 🧠 BACKGROUND -->
<canvas id="neural"></canvas>

<!-- HEADER -->
<div class="header">
  <div>🧠 Wang OS</div>
  <button onclick="openDashboard()">📂</button>
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<!-- HUD -->
<div class="hud">
  <div id="time"></div>
  <div>AI: ONLINE</div>
</div>

<!-- GRAPH -->
<div class="graph-box">
  <canvas id="chart"></canvas>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">
    <button onclick="voice()">🎤</button>
    <input id="input" placeholder="Message Wang..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const chat=document.getElementById("chat");

/* 🧠 ADD MESSAGE */
function add(text,cls){
  chat.innerHTML+=`<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop=chat.scrollHeight;
}

/* 🚀 SEND */
async function send(){
  const input=document.getElementById("input");
  const msg=input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  const res=await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();

  add(format(data.reply),"ai");
}

/* FORMAT */
function format(data){
  let html=`<b>${data.title}</b>`;
  data.sections.forEach(s=>{
    html+=`<br><b>${s.heading}</b>`;
    s.points.forEach(p=>html+=`<div>• ${p}</div>`);
  });
  return html;
}

/* 🎤 VOICE */
function voice(){
  const rec=new webkitSpeechRecognition();
  rec.onresult=e=>{
    document.getElementById("input").value=e.results[0][0].transcript;
  };
  rec.start();
}

/* ⏱️ TIME */
setInterval(()=>{
  document.getElementById("time").innerText=
    new Date().toLocaleTimeString();
},1000);

/* 📊 GRAPH */
new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:["Mon","Tue","Wed","Thu","Fri"],
    datasets:[{
      data:[10,20,15,30,25],
      borderColor:"#38bdf8"
    }]
  }
});

/* 📂 DASHBOARD */
function openDashboard(){
  window.open("dashboard.html");
}

/* 🧠 NEURAL */
const c=document.getElementById("neural");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let nodes=[];
for(let i=0;i<80;i++){
  nodes.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  nodes.forEach(n=>{
    n.x+=n.vx;
    n.y+=n.vy;

    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();

    nodes.forEach(m=>{
      let d=Math.hypot(n.x-m.x,n.y-m.y);
      if(d<120){
        ctx.beginPath();
        ctx.moveTo(n.x,n.y);
        ctx.lineTo(m.x,m.y);
        ctx.strokeStyle="rgba(56,189,248,0.2)";
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
