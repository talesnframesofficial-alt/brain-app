<!DOCTYPE html>
<html>
<head>
  <title>Wang - Your AI Brain</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid #1e293b;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      color: #38bdf8;
    }

    .dashboard-btn {
      padding: 8px 14px;
      background: #22c55e;
      color: black;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }

    /* CHAT AREA */
    #chat {
      height: 75vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .ai {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      padding: 15px;
      border-top: 1px solid #1e293b;
      background: rgba(0,0,0,0.5);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="title">🧠 Wang - Your AI Brain</div>
  <a href="dashboard.html" target="_blank" class="dashboard-btn">📂 Dashboard</a>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="input-area">
  <input id="input" placeholder="Talk to Wang..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value;

  if (!msg) return;

  const chat = document.getElementById("chat");

  // show user message
  chat.innerHTML += `<div class="msg user">${msg}</div>`;

  input.value = "";

  // scroll down
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://brain-app-320i.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.innerHTML += `<div class="msg ai">Error connecting to server ❌</div>`;
  }
}
</script>

</body>
</html>
