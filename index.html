<!DOCTYPE html>
<html>
<head>
<title>Wang OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:system-ui;
  color:white;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
video.bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter: blur(5px) brightness(0.25);
  z-index:-1;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(56,189,248,0.4);
}

.title { color:#38bdf8; font-weight:bold; }

/* CHAT */
.chat {
  position:absolute;
  top:60px;
  bottom:80px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:15px;
}

.msg {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:75%;
}

.user {
  background:#2563eb;
  margin-left:auto;
}

.ai {
  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  box-shadow:0 0 12px #38bdf8;
}

/* IMAGE FIX */
.msg img {
  width:100%;
  max-height:250px;
  object-fit:cover;
  border-radius:10px;
  margin:10px 0;
}

/* INPUT BAR */
.input-area {
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  padding:10px;
  backdrop-filter: blur(10px);
}

input {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:1px solid #38bdf8;
  background:rgba(0,0,0,0.6);
  color:white;
}

button {
  margin-left:5px;
  padding:10px 14px;
  border-radius:50%;
  background:#38bdf8;
  border:none;
}

/* FLOATING WIDGETS */
.widget {
  position:absolute;
  top:80px;
  right:10px;
  background:rgba(0,0,0,0.5);
  border:1px solid #38bdf8;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  box-shadow:0 0 10px #38bdf8;
}

/* DASHBOARD PANEL */
#dashboardPanel {
  position:fixed;
  right:-300px;
  top:0;
  width:300px;
  height:100%;
  background:rgba(0,0,0,0.8);
  backdrop-filter: blur(15px);
  border-left:1px solid #38bdf8;
  transition:0.4s;
  padding:10px;
}

#dashboardPanel.active {
  right:0;
}

/* THINKING */
.thinking {
  display:flex;
  gap:5px;
}
.dot {
  width:6px;
  height:6px;
  background:#38bdf8;
  border-radius:50%;
  animation:blink 1.4s infinite;
}
@keyframes blink {
  0%,80%,100%{opacity:0;}
  40%{opacity:1;}
}
</style>
</head>

<body>

<video autoplay muted loop class="bg">
<source src="https://cdn.coverr.co/videos/coverr-digital-brain-5177/1080p.mp4">
</video>

<div class="header">
  <div class="title">⚡ WANG OS</div>
  <div>
    <button onclick="toggleVoice()">🎤</button>
    <button onclick="toggleDashboard()">📂</button>
  </div>
</div>

<div id="chat" class="chat"></div>

<div class="widget">
  CPU: Active<br>
  Memory: Stable<br>
  AI: Online
</div>

<!-- DASHBOARD -->
<div id="dashboardPanel">
  <h3>🧠 Memory Files</h3>
  <div id="memoryList">Loading...</div>
</div>

<!-- INPUT -->
<div class="input-area">
  <input id="input" placeholder="Talk to Wang..." />
  <input type="file" id="file">
  <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");
let voiceOn = false;

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function thinking(){
  return `<div class="thinking">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>`;
}

function renderAI(data){
  let html = `<h3>${data.title}</h3>`;
  data.sections.forEach(sec=>{
    html += `<b>${sec.heading}</b>`;
    html += `<img src="https://source.unsplash.com/600x300/?${sec.image_query}">`;
    sec.points.forEach(p=>{
      html += `<div>• ${p}</div>`;
    });
  });
  return html;
}

async function send(){
  const input = document.getElementById("input");
  const file = document.getElementById("file").files[0];

  let msg = input.value.trim();
  if(!msg && !file) return;

  add(msg,"user");
  input.value="";

  add(thinking(),"ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();
  chat.lastChild.remove();

  add(renderAI(data.reply),"ai");

  if(voiceOn){
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(data.reply.title));
  }
}

// ENTER KEY
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});

// VOICE TOGGLE
function toggleVoice(){
  voiceOn = !voiceOn;
  alert("Voice " + (voiceOn ? "ON" : "OFF"));
}

// DASHBOARD
function toggleDashboard(){
  document.getElementById("dashboardPanel").classList.toggle("active");
}

// LOAD MEMORY
async function loadMemory(){
  const res = await fetch("https://brain-app-320i.onrender.com/memory");
  const data = await res.json();

  document.getElementById("memoryList").innerHTML =
    data.map(d=>`<div>${d.rawText}</div>`).join("");
}
loadMemory();
</script>

</body>
</html>
