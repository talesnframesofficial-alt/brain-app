<!DOCTYPE html>
<html>
<head>
<title>Wang AI OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🧠 BACKGROUND */
#neural{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
.header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:rgba(0,0,0,0.5);
}

/* 💬 CHAT CENTER */
.chat{
  position:absolute;
  top:80px;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:700px;
  overflow-y:auto;
}

/* MESSAGE */
.msg{
  padding:12px 16px;
  margin:10px 0;
  border-radius:12px;
  width:fit-content;
  max-width:100%;
  line-height:1.5;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.ai{
  background:#222;
}

/* INPUT */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  padding:10px;
  background:#111;
}

.input-box{
  width:90%;
  max-width:700px;
  display:flex;
  background:#222;
  border-radius:12px;
  padding:10px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:white;
  font-size:16px;
  outline:none;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  margin:0 6px;
  cursor:pointer;
}

/* ⏱️ CLOCK LEFT */
.clock{
  position:fixed;
  top:20px;
  left:20px;
  font-size:13px;
}

/* ⚡ HUD RIGHT */
.hud{
  position:fixed;
  top:20px;
  right:20px;
  border:1px solid cyan;
  padding:10px;
  font-size:12px;
}

/* GRAPH */
.graph{
  position:fixed;
  bottom:100px;
  right:20px;
  width:200px;
  height:120px;
  border:1px solid cyan;
}

/* MOBILE */
@media(max-width:600px){
  .msg{max-width:90%;}
}
</style>
</head>

<body>

<canvas id="neural"></canvas>

<div class="header">
  <div>🧠 Wang OS</div>
  <button onclick="window.open('dashboard.html')">📂</button>
</div>

<div id="chat" class="chat"></div>

<!-- CLOCK -->
<div class="clock" id="clock"></div>

<!-- HUD -->
<div class="hud">
  <div id="weather">Loading...</div>
  <div>AI: ONLINE</div>
</div>

<!-- GRAPH -->
<div class="graph">
  <canvas id="chart"></canvas>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">

    <button onclick="voice()">🎤</button>

    <input id="input" placeholder="Message Wang..." />

    <input type="file" id="img" hidden>
    <button onclick="document.getElementById('img').click()">📎</button>

    <button onclick="send()">➤</button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const chat=document.getElementById("chat");

// ADD MESSAGE
function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.innerHTML=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// FORMAT RESPONSE
function format(data){
  if(!data || !data.sections) return "⚠️ Error";

  let html=`<b>${data.title}</b><br><br>`;
  data.sections.forEach(s=>{
    if(s.heading) html+=`<b>${s.heading}</b>`;
    (s.points||[]).forEach(p=>html+=`<div>• ${p}</div>`);
    html+="<br>";
  });
  return html;
}

// SEND
async function send(){
  const input=document.getElementById("input");
  const msg=input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  try{
    const res=await fetch("https://brain-app-320i.onrender.com/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });

    const data=await res.json();
    add(format(data.reply),"ai");

  }catch{
    add("❌ Server error","ai");
  }
}

// ENTER
document.getElementById("input").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

// VOICE
function voice(){
  const rec=new webkitSpeechRecognition();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
  };
  rec.start();
}

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText=
    new Date().toLocaleString();
},1000);

// WEATHER
fetch("https://api.open-meteo.com/v1/forecast?latitude=8.52&longitude=76.93&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("weather").innerText=
    "🌡️ "+d.current_weather.temperature+"°C";
});

// GRAPH
new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:["Mon","Tue","Wed","Thu","Fri"],
    datasets:[{
      data:[10,20,15,30,25],
      borderColor:"cyan"
    }]
  }
});

// 🧠 GOLD + BLUE NEURAL
const c=document.getElementById("neural");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let nodes=[];
for(let i=0;i<90;i++){
  nodes.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:(Math.random()-0.5)*0.7,
    vy:(Math.random()-0.5)*0.7
  });
}

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,c.width,c.height);

  nodes.forEach(n=>{
    n.x+=n.vx;
    n.y+=n.vy;

    // GOLD NODE
    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle="#FFD700";
    ctx.fill();

    nodes.forEach(m=>{
      let d=Math.hypot(n.x-m.x,n.y-m.y);

      if(d<130){
        ctx.beginPath();
        ctx.moveTo(n.x,n.y);
        ctx.lineTo(m.x,m.y);

        ctx.strokeStyle = d<60
          ? "rgba(255,215,0,0.4)"   // gold
          : "rgba(0,200,255,0.25)"; // blue

        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
