<!DOCTYPE html>
<html>
<head>
<title>Wang OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:system-ui;
  color:white;
  overflow:hidden;
}

/* 🎥 VIDEO BACKGROUND */
video.bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter: blur(6px) brightness(0.3);
  z-index:-1;
}

/* ⚡ BOOT */
#boot {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.core {
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #38bdf8;
  box-shadow:0 0 40px #38bdf8, inset 0 0 40px #38bdf8;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.15);}
  100%{transform:scale(1);}
}

.boot-text {
  margin-top:20px;
  color:#38bdf8;
  letter-spacing:2px;
}

/* MAIN */
#app {
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(56,189,248,0.3);
}

.title {
  color:#38bdf8;
  font-weight:bold;
}

/* CHAT */
.chat {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:80%;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}

.user {
  background:#2563eb;
  margin-left:auto;
}

.ai {
  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  box-shadow:0 0 15px rgba(56,189,248,0.4);
}

/* ⚡ THINKING ANIMATION */
.thinking {
  display:flex;
  gap:6px;
}

.dot {
  width:8px;
  height:8px;
  background:#38bdf8;
  border-radius:50%;
  animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink {
  0%,80%,100%{opacity:0;}
  40%{opacity:1;}
}

/* INPUT */
.input-area {
  display:flex;
  padding:10px;
  backdrop-filter: blur(10px);
}

input {
  flex:1;
  padding:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  color:white;
}

button {
  margin-left:5px;
  padding:10px;
  background:#38bdf8;
  border:none;
}
</style>
</head>

<body>

<!-- 🎥 BACKGROUND VIDEO -->
<video autoplay muted loop class="bg">
  <source src="https://cdn.coverr.co/videos/coverr-data-stream-5176/1080p.mp4" type="video/mp4">
</video>

<!-- ⚡ BOOT -->
<div id="boot">
  <div class="core"></div>
  <div class="boot-text">WANG OS INITIALIZING...</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
  <div class="title">⚡ WANG OS</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Talk to Wang..." />
  <button onclick="send()">➤</button>
</div>

</div>

<script>

// boot
setTimeout(()=>{
  boot.style.display="none";
  app.style.display="flex";
},2500);

const chat = document.getElementById("chat");

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// thinking animation
function thinking(){
  return `
  <div class="thinking">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>`;
}

// render AI
function renderAI(data){
  let html = `<h2>${data.title}</h2>`;
  data.sections.forEach(sec=>{
    html += `<h3>${sec.heading}</h3>`;
    html += `<img src="https://source.unsplash.com/600x300/?${sec.image_query}">`;
    sec.points.forEach(p=>{
      html += `<div>• ${p}</div>`;
    });
  });
  return html;
}

// send
async function send(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  add(thinking(),"ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  chat.lastChild.remove();

  add(renderAI(data.reply),"ai");
}
</script>

</body>
</html>
