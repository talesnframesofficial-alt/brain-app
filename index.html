<!DOCTYPE html>
<html>
<head>
<title>Wang AI OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🌐 NETWORK BACKGROUND */
#neural{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* 💬 CHAT CENTER */
.chat{
  position:absolute;
  top:80px;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:700px;
  overflow-y:auto;
}

/* MESSAGE */
.msg{
  padding:12px 16px;
  margin:10px 0;
  border-radius:12px;
  width:fit-content;
  max-width:100%;
}

.user{
  background:#3b82f6;
  margin-left:auto;
}

.ai{
  background:#222;
}

/* INPUT */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  padding:10px;
  background:#111;
}

.input-box{
  width:90%;
  max-width:700px;
  display:flex;
  background:#222;
  border-radius:12px;
  padding:10px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:white;
  font-size:16px;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  margin:0 6px;
}

/* ⚡ LEFT CLOCK */
.clock-box{
  position:fixed;
  top:20px;
  left:20px;
}

/* ⚡ RIGHT HUD */
.hud{
  position:fixed;
  top:20px;
  right:20px;
  border:1px solid cyan;
  padding:10px;
  font-size:12px;
}

/* GRAPH */
.graph{
  position:fixed;
  bottom:100px;
  right:20px;
  width:200px;
  height:120px;
  border:1px solid cyan;
}

/* HEADER */
.header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px;
}
</style>
</head>

<body>

<canvas id="neural"></canvas>

<div class="header">
  <div>🧠 Wang OS</div>
  <button onclick="window.open('dashboard.html')">📂</button>
</div>

<div id="chat" class="chat"></div>

<!-- CLOCK LEFT -->
<div class="clock-box">
  <!-- already inserted widget above -->
</div>

<!-- HUD RIGHT -->
<div class="hud">
  <div id="weather"></div>
  <div>AI: ONLINE</div>
</div>

<!-- GRAPH -->
<div class="graph">
  <canvas id="chart"></canvas>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">
    <button onclick="voice()">🎤</button>

    <input id="input" placeholder="Message Wang..." />

    <input type="file" id="img" hidden>
    <button onclick="document.getElementById('img').click()">📎</button>

    <button onclick="send()">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const chat=document.getElementById("chat");

// ADD MESSAGE
function add(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.innerHTML=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// FORMAT
function format(data){
  let html=`<b>${data.title}</b><br><br>`;
  data.sections.forEach(s=>{
    html+=`<b>${s.heading}</b>`;
    s.points.forEach(p=>html+=`<div>• ${p}</div>`);
  });
  return html;
}

// SEND
async function send(){
  const input=document.getElementById("input");
  const msg=input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  const res=await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();
  add(format(data.reply),"ai");
}

// VOICE
function voice(){
  const rec=new webkitSpeechRecognition();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
  };
  rec.start();
}

// WEATHER
fetch("https://api.open-meteo.com/v1/forecast?latitude=8.52&longitude=76.93&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("weather").innerText=
    "🌡️ "+d.current_weather.temperature+"°C";
});

// GRAPH
new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:["Mon","Tue","Wed","Thu"],
    datasets:[{data:[10,20,15,25],borderColor:"cyan"}]
  }
});

// 🧠 INDIA-MAP STYLE FLOW
const c=document.getElementById("neural");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let lines=[];
for(let i=0;i<60;i++){
  lines.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:Math.random()*2
  });
}

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,c.width,c.height);

  lines.forEach(l=>{
    ctx.beginPath();
    ctx.moveTo(l.x,l.y);
    ctx.lineTo(l.x+l.vx*10,l.y);
    ctx.strokeStyle="rgba(0,255,255,0.5)";
    ctx.stroke();

    l.x+=l.vx;
    if(l.x>c.width) l.x=0;
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
