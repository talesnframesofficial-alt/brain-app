<!DOCTYPE html>
<html>
<head>
<title>Wang AI</title>
<style>
body {
  margin:0;
  background: radial-gradient(circle, #020617, #000);
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
  border-bottom:1px solid #38bdf8;
}

.title { color:#38bdf8; font-weight:bold; }

/* CHAT */
.chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.msg {
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  max-width:70%;
}

.user { background:#2563eb; margin-left:auto; }
.ai {
  background:#020617;
  border:1px solid #38bdf8;
  box-shadow:0 0 15px #38bdf8;
}

/* INPUT */
.input-area {
  display:flex;
  padding:10px;
  background:#020617;
}

input {
  flex:1;
  padding:12px;
  background:#000;
  color:white;
  border:1px solid #38bdf8;
}

button {
  margin-left:5px;
  padding:12px;
  background:#38bdf8;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">⚡ Wang AI</div>
  <a href="dashboard.html" style="color:#22c55e">Dashboard</a>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Talk to Wang..." />
  <button onclick="send()">Send</button>
  <button onclick="voice()">🎤</button>
  <input type="file" id="img"/>
</div>

<script>
const chat = document.getElementById("chat");

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// 🎤 VOICE INPUT
function voice(){
  const rec = new webkitSpeechRecognition();
  rec.onresult = e=>{
    document.getElementById("input").value = e.results[0][0].transcript;
  };
  rec.start();
}

// 🔊 VOICE OUTPUT
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}

async function send(){
  const input = document.getElementById("input");
  const file = document.getElementById("img").files[0];

  let msg = input.value;
  if(!msg && !file) return;

  add(msg,"user");
  input.value="";

  let base64 = null;

  if(file){
    const reader = new FileReader();
    reader.onload = async function(){
      base64 = reader.result;

      processSend(msg, base64);
    };
    reader.readAsDataURL(file);
  } else {
    processSend(msg, null);
  }
}

async function processSend(msg, img){
  add("Wang thinking...","ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg, image:img})
  });

  const data = await res.json();
  chat.lastChild.remove();

  add(data.reply,"ai");
  speak(data.reply); // 🔊 voice reply
}
</script>

</body>
</html>
