<!DOCTYPE html>
<html>
<head>
<title>Wang OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  color:white;
  background:black;
  overflow:hidden;
}

/* NEURAL CANVAS */
#neural{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* CHAT */
.chat{
  position:absolute;
  top:60px;
  bottom:80px;
  width:100%;
  overflow-y:auto;
  padding:20px;
}

.msg{
  max-width:700px;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
}

.user{ background:#3b82f6; margin-left:auto;}
.ai{ background:rgba(50,50,60,0.8); }

/* INPUT */
.input-area{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:#111;
}

.input-box{
  display:flex;
  background:#222;
  padding:10px;
  border-radius:10px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:white;
}

button{
  margin-left:5px;
}
</style>
</head>

<body>

<canvas id="neural"></canvas>

<div id="chat" class="chat"></div>

<div class="input-area">
  <div class="input-box">
    <button onclick="voice()">🎤</button>
    <input id="input" placeholder="Talk to Wang..." />
    <button onclick="send()">➤</button>
  </div>
</div>

<script>
// CHAT
const chat = document.getElementById("chat");

function add(text,cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
}

// SEND
async function send(){
  const input = document.getElementById("input");
  const msg = input.value;
  if(!msg) return;

  add(msg,"user");
  input.value="";

  const res = await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();
  add(JSON.stringify(data.reply),"ai");
}

// VOICE
function voice(){
  const rec = new webkitSpeechRecognition();
  rec.onresult = e=>{
    document.getElementById("input").value = e.results[0][0].transcript;
  };
  rec.start();
}

// 🧠 NEURAL ANIMATION
const canvas = document.getElementById("neural");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let nodes=[];
for(let i=0;i<70;i++){
  nodes.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  nodes.forEach(n=>{
    n.x+=n.vx;
    n.y+=n.vy;

    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();

    nodes.forEach(m=>{
      let dx=n.x-m.x;
      let dy=n.y-m.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(n.x,n.y);
        ctx.lineTo(m.x,m.y);
        ctx.strokeStyle="rgba(56,189,248,0.2)";
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
