<!DOCTYPE html>
<html>
<head>
<title>Wang OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#343541;
  color:white;
  height:100vh;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter: blur(8px) brightness(0.25) contrast(1.2);
  z-index:-2;
}

/* HUD LINES */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: repeating-linear-gradient(
    transparent,
    transparent 2px,
    rgba(0,255,255,0.03) 3px
  );
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:rgba(32,33,35,0.9);
}

button {
  cursor:pointer;
}

/* CHAT */
.chat {
  height:calc(100vh - 140px);
  overflow-y:auto;
  padding:20px;
}

.msg {
  max-width:700px;
  padding:12px;
  border-radius:8px;
  margin:10px 0;
  transition:0.2s;
}

.msg:hover {
  box-shadow:0 0 15px rgba(56,189,248,0.6);
  transform:scale(1.01);
}

.user {
  background:#3b82f6;
  margin-left:auto;
}

.ai {
  background:rgba(68,70,84,0.9);
}

/* IMAGES */
.msg img {
  width:100%;
  border-radius:8px;
  margin:10px 0;
}

/* INPUT */
.input-area {
  display:flex;
  padding:10px;
  background:#202123;
}

input {
  flex:1;
  padding:12px;
  background:#40414f;
  border:none;
  color:white;
}

.send-btn {
  background:#3b82f6;
  border:none;
  padding:10px;
  margin-left:5px;
}

/* HUD WIDGET */
.widget {
  position:fixed;
  top:70px;
  right:20px;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border:1px solid #38bdf8;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<img src="assets/art123.png" class="bg">

<div class="header">
  <div>🧠 Wang OS</div>
  <button onclick="openDashboard()">📂 Dashboard</button>
</div>

<div id="chat" class="chat"></div>

<div class="widget">
  <div id="time"></div>
  <div>AI: ONLINE</div>
</div>

<div class="input-area">
  <input id="input" placeholder="Ask anything..." />
  <button class="send-btn" onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

// TIME
setInterval(()=>{
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
},1000);

// ADD MSG
function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// RENDER AI
function renderAI(data){
  let html = `<b>${data.title}</b><br><br>`;

  data.sections.forEach(sec=>{
    html += `<b>${sec.heading}</b>`;
    html += `<img src="https://picsum.photos/seed/${encodeURIComponent(sec.image_query)}/600/300">`;

    sec.points.forEach(p=>{
      html += `<div>• ${p}</div>`;
    });

    html += "<br>";
  });

  return html;
}

// SEND
async function send(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  add("Thinking...","ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  chat.lastChild.remove();
  add(renderAI(data.reply),"ai");
}

// ENTER KEY
input.addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});

// DASHBOARD
function openDashboard(){
  window.open("dashboard.html","_blank");
}
</script>

</body>
</html>
