<!DOCTYPE html>
<html>
<head>
<title>Wang OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🧠 NEURAL BACKGROUND */
#neural{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
.header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

/* CHAT CONTAINER (CENTERED) */
.chat{
  position:absolute;
  top:70px;
  bottom:100px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-y:auto;
}

/* MESSAGE */
.msg{
  max-width:700px;
  width:fit-content;
  padding:12px 16px;
  margin:8px;
  border-radius:10px;
  line-height:1.5;
}

.user{
  background:#3b82f6;
  align-self:flex-end;
}

.ai{
  background:#222;
  align-self:flex-start;
}

/* INPUT */
.input-area{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  padding:10px;
  background:#111;
}

.input-box{
  width:90%;
  max-width:700px;
  display:flex;
  background:#222;
  border-radius:12px;
  padding:10px;
}

input{
  flex:1;
  background:none;
  border:none;
  color:white;
  font-size:16px;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  margin:0 5px;
  cursor:pointer;
}

/* HUD */
.hud{
  position:fixed;
  top:70px;
  right:20px;
  background:rgba(0,0,0,0.6);
  border:1px solid cyan;
  padding:10px;
  font-size:12px;
}

/* GRAPH */
.graph{
  position:fixed;
  bottom:100px;
  right:20px;
  width:220px;
  height:140px;
  background:rgba(0,0,0,0.6);
  border:1px solid cyan;
  padding:10px;
}

/* MOBILE */
@media(max-width:600px){
  .msg{max-width:90%;}
  .input-box{width:95%;}
}
</style>
</head>

<body>

<canvas id="neural"></canvas>

<div class="header">
  <div>🧠 Wang OS</div>
  <button onclick="window.open('dashboard.html')">📂</button>
</div>

<div id="chat" class="chat"></div>

<!-- HUD -->
<div class="hud">
  <div id="time"></div>
  <div id="weather">Loading...</div>
  <div>AI: ONLINE</div>
</div>

<!-- GRAPH -->
<div class="graph">
  <canvas id="chart"></canvas>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">

    <button onclick="voice()">🎤</button>

    <input id="input" placeholder="Message Wang..." />

    <input type="file" id="img" hidden>
    <button onclick="document.getElementById('img').click()">📎</button>

    <button onclick="send()">➤</button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const chat=document.getElementById("chat");

// ADD MESSAGE
function add(text,cls){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

// FORMAT
function format(data){
  let html=`<b>${data.title}</b><br><br>`;
  data.sections.forEach(s=>{
    html+=`<b>${s.heading}</b>`;
    s.points.forEach(p=>html+=`<div>• ${p}</div>`);
    html+="<br>";
  });
  return html;
}

// SEND
async function send(){
  const input=document.getElementById("input");
  const msg=input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  const res=await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();
  add(format(data.reply),"ai");
}

// VOICE
function voice(){
  const rec=new webkitSpeechRecognition();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
  };
  rec.start();
}

// TIME
setInterval(()=>{
  document.getElementById("time").innerText=
    new Date().toLocaleString();
},1000);

// WEATHER (Trivandrum)
fetch("https://api.open-meteo.com/v1/forecast?latitude=8.52&longitude=76.93&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("weather").innerText=
    "🌡️ "+d.current_weather.temperature+"°C";
});

// GRAPH
new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:["Mon","Tue","Wed","Thu","Fri"],
    datasets:[{
      data:[10,20,15,30,25],
      borderColor:"cyan"
    }]
  }
});

// NEURAL
const c=document.getElementById("neural");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let nodes=[];
for(let i=0;i<80;i++){
  nodes.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  nodes.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;

    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();

    nodes.forEach(m=>{
      let d=Math.hypot(n.x-m.x,n.y-m.y);
      if(d<120){
        ctx.beginPath();
        ctx.moveTo(n.x,n.y);
        ctx.lineTo(m.x,m.y);
        ctx.strokeStyle="rgba(56,189,248,0.2)";
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
