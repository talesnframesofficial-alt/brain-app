<!DOCTYPE html>
<html>
<head>
<title>Wang AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0b0f19;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
}

.title { color:#60a5fa; }

.chat {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:85%;
}

.user {
  align-self:flex-end;
  background:#2563eb;
}

.ai {
  background:#111827;
  border:1px solid #374151;
}

img {
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

.input-area {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:12px;
  background:#1f2937;
  border:none;
  color:white;
}

button {
  margin-left:5px;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
}
</style>

</head>

<body>

<div class="header">
  <div class="title">🧠 Wang AI</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// render AI nicely
function renderAI(data){
  let html = `<h2>${data.title}</h2>`;

  data.sections.forEach(sec=>{
    html += `<h3>${sec.heading}</h3>`;

    if(sec.image_query){
      html += `<img src="https://source.unsplash.com/600x300/?${sec.image_query}">`;
    }

    sec.points.forEach(p=>{
      html += `<div>• ${p}</div>`;
    });
  });

  return html;
}

async function send(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  add("Thinking...","ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  chat.lastChild.remove();

  add(renderAI(data.reply),"ai");
}
</script>

</body>
</html>
