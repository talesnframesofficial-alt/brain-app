<!DOCTYPE html>
<html>
<head>
<title>Wang AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#343541;
}

/* BACKGROUND IMAGE */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  filter: blur(8px) brightness(0.25) contrast(1.2);
  z-index:-2;
}

/* HUD LINES */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: repeating-linear-gradient(
    transparent,
    transparent 2px,
    rgba(0,255,255,0.03) 3px
  );
  pointer-events:none;
  z-index:-1;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:rgba(32,33,35,0.9);
  backdrop-filter: blur(10px);
  border-bottom:1px solid #444;
}

.title {
  font-weight:600;
}

.dashboard-btn {
  background:#444;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

/* CHAT */
.chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MESSAGES */
.msg {
  max-width:700px;
  padding:12px 16px;
  border-radius:8px;
  line-height:1.5;
}

.user {
  align-self:flex-end;
  background:#3b82f6;
}

.ai {
  align-self:flex-start;
  background:rgba(68,70,84,0.9);
}

/* IMAGE */
.msg img {
  width:100%;
  border-radius:8px;
  margin:10px 0;
}

/* INPUT */
.input-area {
  padding:15px;
  background:rgba(32,33,35,0.95);
}

.input-box {
  display:flex;
  align-items:center;
  background:#40414f;
  border-radius:10px;
  padding:10px;
}

input {
  flex:1;
  background:transparent;
  border:none;
  color:white;
  outline:none;
  font-size:15px;
}

/* SEND BUTTON */
.send-btn {
  background:#3b82f6;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  margin-left:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- YOUR BACKGROUND -->
<img src="assets/art123.png" class="bg">

<!-- HEADER -->
<div class="header">
  <div class="title">🧠 Wang AI</div>
  <button class="dashboard-btn" onclick="openDashboard()">Dashboard</button>
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">
    <input id="input" placeholder="Message Wang..." />
    <button class="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");

// ADD MESSAGE
function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// RENDER AI RESPONSE (WITH IMAGES)
function renderAI(data){
  let html = `<b>${data.title}</b><br><br>`;

  data.sections.forEach(sec=>{
    html += `<b>${sec.heading}</b>`;
    
    // IMAGE (FIXED)
    html += `<img src="https://picsum.photos/seed/${encodeURIComponent(sec.image_query)}/600/300">`;

    sec.points.forEach(p=>{
      html += `<div>• ${p}</div>`;
    });

    html += "<br>";
  });

  return html;
}

// SEND MESSAGE
async function send(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  add("Thinking...","ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  chat.lastChild.remove();
  add(renderAI(data.reply),"ai");
}

// ENTER KEY SUPPORT
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});

// DASHBOARD BUTTON
function openDashboard(){
  window.open("dashboard.html","_blank");
}
</script>

</body>
</html>
