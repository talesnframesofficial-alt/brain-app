<!DOCTYPE html>
<html>
<head>
<title>Wang AI</title>

<style>
body {
  margin:0;
  background:#020617;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #38bdf8;
}

.title { color:#38bdf8; font-weight:bold; }

.chat {
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.msg {
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  max-width:70%;
}

.user { background:#2563eb; margin-left:auto; }
.ai {
  background:#020617;
  border:1px solid #38bdf8;
  box-shadow:0 0 10px #38bdf8;
}

.input-area {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:12px;
  background:#000;
  border:1px solid #38bdf8;
  color:white;
}

button {
  margin-left:5px;
  padding:12px;
  background:#38bdf8;
  border:none;
}
</style>

</head>
<body>

<div class="header">
  <div class="title">⚡ Wang AI</div>
  <button onclick="stopVoice()">⏹ Stop</button>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
  <button onclick="voice()">🎤</button>
</div>

<script>
const chat = document.getElementById("chat");

// FORMAT RESPONSE
function format(text){
  return text
    .replace(/## (.*)/g, "<h3>$1</h3>")
    .replace(/\n- /g, "<br>• ")
    .replace(/\n/g,"<br>");
}

// CLEAN TEXT FOR VOICE
function cleanForVoice(text){
  return text
    .replace(/##/g,"")
    .replace(/\*/g,"")
    .replace(/•/g,"")
    .replace(/<[^>]*>/g,"");
}

// ADD MESSAGE
function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// STOP VOICE
function stopVoice(){
  speechSynthesis.cancel();
}

// VOICE INPUT
function voice(){
  const rec = new webkitSpeechRecognition();
  rec.onresult = e=>{
    document.getElementById("input").value = e.results[0][0].transcript;
  };
  rec.start();
}

// VOICE OUTPUT (FIXED)
function speak(text){
  speechSynthesis.cancel(); // stop previous

  const clean = cleanForVoice(text);

  const speech = new SpeechSynthesisUtterance(clean);
  speech.rate = 1;
  speech.pitch = 1;

  speechSynthesis.speak(speech);
}

// SEND
async function send(){
  const input = document.getElementById("input");
  const msg = input.value;
  if(!msg) return;

  add(msg,"user");
  input.value="";

  add("Wang thinking...","ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  chat.lastChild.remove();

  add(format(data.reply),"ai");

  speak(data.reply);
}
</script>

</body>
</html>
