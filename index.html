<!DOCTYPE html>
<html>
<head>
<title>Wang AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background:#0b0f19;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:#111827;
  border-bottom:1px solid #1f2937;
}

.title {
  font-size:16px;
  font-weight:600;
  color:#60a5fa;
}

.header-btn {
  background:#1f2937;
  padding:6px 10px;
  border-radius:6px;
  color:white;
  text-decoration:none;
}

/* CHAT AREA */
.chat {
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MESSAGE */
.msg {
  max-width:85%;
  padding:12px 14px;
  border-radius:12px;
  line-height:1.5;
  font-size:14px;
}

/* USER */
.user {
  align-self:flex-end;
  background:#2563eb;
}

/* AI */
.ai {
  align-self:flex-start;
  background:#111827;
  border:1px solid #374151;
}

/* INPUT BAR */
.input-area {
  display:flex;
  padding:10px;
  background:#111827;
  border-top:1px solid #1f2937;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
  font-size:14px;
}

button {
  margin-left:6px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-weight:500;
}

/* MOBILE FIX */
@media (max-width:600px){
  .msg { max-width:95%; }
  .title { font-size:14px; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">🧠 Wang AI</div>
  <div>
    <button class="header-btn" onclick="stopVoice()">⏹</button>
    <a href="dashboard.html" class="header-btn">📂</a>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<!-- INPUT -->
<div class="input-area">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">➤</button>
  <button onclick="voice()">🎤</button>
</div>

<script>
const chat = document.getElementById("chat");

// FORMAT
function format(text){
  return text
    .replace(/## (.*)/g,"<b>$1</b><br>")
    .replace(/\n/g,"<br>");
}

// CLEAN VOICE
function clean(text){
  return text.replace(/[#*•]/g,"");
}

// ADD MSG
function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// STOP VOICE
function stopVoice(){
  speechSynthesis.cancel();
}

// VOICE INPUT
function voice(){
  const rec = new webkitSpeechRecognition();
  rec.onresult = e=>{
    document.getElementById("input").value = e.results[0][0].transcript;
  };
  rec.start();
}

// VOICE OUTPUT
function speak(text){
  speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(clean(text));
  speech.rate = 1;
  speechSynthesis.speak(speech);
}

// SEND
async function send(){
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  add("Wang is thinking...","ai");

  const res = await fetch("https://brain-app-320i.onrender.com/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  chat.lastChild.remove();
  add(format(data.reply),"ai");

  speak(data.reply);
}
</script>

</body>
</html>
